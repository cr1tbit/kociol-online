backend:
  name: github
  repo: cr1tbit/kociol-online
  branch: main
  base_url: https://priv.vcc.earth
  auth_endpoint: auth

publish_mode: editorial_workflow
media_folder: static/uploads
public_folder: /uploads

site_url: https://kociol.vcc.earth
display_url: https://kociol.vcc.earth

collections:
  - name: main_pages
    label: "01. Strony z menu"
    files:
      - name: home
        label: "Kocioł info (strona główna /)"
        file: content/_index.md
        fields:
          - label: Hero title
            name: title
            widget: string
          - label: Hero lines
            name: hero_lines
            widget: list
            required: false
            field:
              label: Line
              name: line
              widget: markdown
          - label: Section heading
            name: section_heading
            widget: string
          - label: Section paragraphs
            name: section_paragraphs
            widget: list
            required: false
            field:
              label: Paragraph
              name: paragraph
              widget: markdown
          - label: Gallery images
            name: gallery_images
            widget: list
            required: false
            hint: "For static files use paths starting with /, e.g. /img/photo.jpg"
            field:
              label: Image
              name: image
              widget: image
      - name: kalendarz
        label: "Kalendarz (/kalendarz/)"
        file: content/kalendarz.md
        fields:
          - label: Title
            name: title
            widget: string
          - label: Publish date
            name: date
            widget: datetime
            required: false
          - label: Draft
            name: draft
            widget: boolean
            default: false
          - label: Body
            name: body
            widget: markdown
      - name: posts_index
        label: "Wydarzenia info (strona listy /posts/)"
        file: content/posts/_index.md
        fields:
          - label: Title
            name: title
            widget: string
          - label: Body
            name: body
            widget: markdown
            required: false
      - name: album_zdjec
        label: "Album zdjęć (/album-zdjec/)"
        file: content/album-zdjec.md
        fields:
          - label: Title
            name: title
            widget: string
          - label: Publish date
            name: date
            widget: datetime
            required: false
          - label: Draft
            name: draft
            widget: boolean
            default: false
          - label: Body
            name: body
            widget: markdown
      - name: kotlownia
        label: "Kotłownia (strona listy /kotlownia/)"
        file: content/kotlownia/_index.md
        fields:
          - label: Title
            name: title
            widget: string
          - label: Publish date
            name: date
            widget: datetime
            required: false
          - label: Draft
            name: draft
            widget: boolean
            default: false
          - label: Body
            name: body
            widget: markdown
      - name: discord
        label: "Discord (/discord/)"
        file: content/discord.md
        fields:
          - label: Title
            name: title
            widget: string
          - label: Publish date
            name: date
            widget: datetime
            required: false
          - label: Draft
            name: draft
            widget: boolean
            default: false
          - label: Body
            name: body
            widget: markdown
  - name: kociol_info
    label: "02. Kocioł info - podstrony"
    folder: content/kociol-info
    create: true
    slug: "{{slug}}"
    preview_path: kociol-info/{{slug}}/
    fields:
      - label: Title
        name: title
        widget: string
      - label: Publish date
        name: date
        widget: datetime
        required: false
      - label: Draft
        name: draft
        widget: boolean
        default: false
      - label: Summary
        name: summary
        widget: markdown
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
      - label: Categories
        name: categories
        widget: list
        required: false
      - label: Body
        name: body
        widget: markdown
  - name: posts
    label: "03. Wydarzenia info - wpisy"
    folder: content/posts
    create: true
    slug: "{{slug}}"
    preview_path: posts/{{slug}}/
    fields:
      - label: Title
        name: title
        widget: string
      - label: Publish date
        name: date
        widget: datetime
      - label: Draft
        name: draft
        widget: boolean
        default: false
      - label: Summary
        name: summary
        widget: markdown
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
      - label: Categories
        name: categories
        widget: list
        required: false
      - label: Body
        name: body
        widget: markdown
        hint: "Use Markdown formatting, e.g. ## Heading, **bold**, *italic*, - list, [link](https://...)"
  - name: kotlownia_posts
    label: "04. Kotłownia - wpisy"
    folder: content/kotlownia
    create: true
    slug: "{{slug}}"
    preview_path: kotlownia/{{slug}}/
    fields:
      - label: Title
        name: title
        widget: string
      - label: Publish date
        name: date
        widget: datetime
      - label: Draft
        name: draft
        widget: boolean
        default: false
      - label: Summary
        name: summary
        widget: markdown
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
      - label: Categories
        name: categories
        widget: list
        required: false
      - label: Body
        name: body
        widget: markdown
        hint: "Use Markdown formatting, e.g. ## Heading, **bold**, *italic*, - list, [link](https://...)"
  - name: site_data
    label: "05. Galerie i dane"
    files:
      - name: calendar_months
        label: Kalendarz Miesięcy
        file: data/calendar/months.yaml
        fields:
          - label: Months
            name: months
            widget: list
            summary: "{{fields.month}} {{fields.year}}"
            fields:
              - label: Month
                name: month
                widget: string
              - label: Year
                name: year
                widget: number
                value_type: int
                min: 2000
              - label: Image
                name: image
                widget: image
      - name: album_photos
        label: Album Zdjęć
        file: data/album/photos.yaml
        fields:
          - label: Photos
            name: photos
            widget: list
            summary: "{{fields.title}}"
            fields:
              - label: Title
                name: title
                widget: string
              - label: Image
                name: image
                widget: image
              - label: Caption
                name: caption
                widget: string
                required: false
